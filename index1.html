  <p class="date">生效日期：2026年5月1日</p>

  <h2>一、适用范围</h2>
  <p>本声明适用于未满14周岁的儿童在使用《浮生打工录》应用过程中的隐私保护。</p>

  <h2>二、信息收集</h2>
  <p>本应用为本地单机应用，所有数据（包括儿童用户的数据）均仅存储于用户设备本地，我们不会收集、上传或传输任何个人信息。</p>

  <h2>三、监护人同意</h2>
  <p>儿童使用本应用前，应获得其监护人的同意。监护人有权查看、修改或删除儿童在本应用内的本地数据。</p>
